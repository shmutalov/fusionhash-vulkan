# HiveOS custom miner manifest for vulkminer (FusionHash / cn-gpu, Vulkan).
CUSTOM_NAME=vulkminer
CUSTOM_VERSION=0.1.2
CUSTOM_BUILD=1

# Where h-config.sh writes the generated command line.
CUSTOM_CONFIG_FILENAME=/hive/miners/custom/vulkminer/vulkminer.conf

# Log/stats basename. HiveOS appends .log; the miner writes <base>.stats.json.
CUSTOM_LOG_BASENAME=/var/log/miner/vulkminer/vulkminer
